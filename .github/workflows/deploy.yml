name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/kenyapredictmarkert-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the image name — GHCR rejects uppercase in the path.
      - name: Lowercase image name
        id: img
        run: |
          echo "name=$(echo '${{ env.IMAGE }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + config to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/nginx.conf,scripts/init-databases.sql,scripts/create-kafka-topics.sh"
          target: "/opt/kenyapredict/"
          overwrite: true

      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ github.sha }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          JWT_ACCESS_EXPIRES_IN: ${{ secrets.JWT_ACCESS_EXPIRES_IN }}
          JWT_REFRESH_EXPIRES_IN: ${{ secrets.JWT_REFRESH_EXPIRES_IN }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          MPESA_ENVIRONMENT: ${{ secrets.MPESA_ENVIRONMENT }}
          MPESA_CONSUMER_KEY: ${{ secrets.MPESA_CONSUMER_KEY }}
          MPESA_CONSUMER_SECRET: ${{ secrets.MPESA_CONSUMER_SECRET }}
          MPESA_SHORT_CODE: ${{ secrets.MPESA_SHORT_CODE }}
          MPESA_PASSKEY: ${{ secrets.MPESA_PASSKEY }}
          MPESA_B2C_INITIATOR_NAME: ${{ secrets.MPESA_B2C_INITIATOR_NAME }}
          MPESA_B2C_SECURITY_CREDENTIAL: ${{ secrets.MPESA_B2C_SECURITY_CREDENTIAL }}
          MPESA_CALLBACK_BASE_URL: ${{ secrets.MPESA_CALLBACK_BASE_URL }}
          MPESA_STK_CALLBACK_URL: ${{ secrets.MPESA_STK_CALLBACK_URL }}
          MPESA_B2C_RESULT_URL: ${{ secrets.MPESA_B2C_RESULT_URL }}
          MPESA_B2C_QUEUE_TIMEOUT_URL: ${{ secrets.MPESA_B2C_QUEUE_TIMEOUT_URL }}
          AT_API_KEY: ${{ secrets.AT_API_KEY }}
          AT_USERNAME: ${{ secrets.AT_USERNAME }}
          AT_SENDER_ID: ${{ secrets.AT_SENDER_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # GITHUB_TOKEN is ephemeral (valid for this workflow run only) and has
          # packages:read scope from the permissions block above — enough for
          # `docker login ghcr.io` from the droplet during this deploy.
          GHCR_PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: IMAGE_TAG,POSTGRES_USER,POSTGRES_PASSWORD,REDIS_PASSWORD,JWT_PRIVATE_KEY,JWT_PUBLIC_KEY,JWT_ACCESS_EXPIRES_IN,JWT_REFRESH_EXPIRES_IN,INTERNAL_API_KEY,MPESA_ENVIRONMENT,MPESA_CONSUMER_KEY,MPESA_CONSUMER_SECRET,MPESA_SHORT_CODE,MPESA_PASSKEY,MPESA_B2C_INITIATOR_NAME,MPESA_B2C_SECURITY_CREDENTIAL,MPESA_CALLBACK_BASE_URL,MPESA_STK_CALLBACK_URL,MPESA_B2C_RESULT_URL,MPESA_B2C_QUEUE_TIMEOUT_URL,AT_API_KEY,AT_USERNAME,AT_SENDER_ID,FIREBASE_SERVICE_ACCOUNT_JSON,GHCR_PULL_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd /opt/kenyapredict

            # Build the per-service DATABASE_URLs from POSTGRES_USER/PASSWORD.
            PGBASE="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432"

            umask 077
            cat > .env.new <<EOF
            IMAGE_TAG=${IMAGE_TAG}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            REDIS_PASSWORD=${REDIS_PASSWORD}
            REDIS_HOST=redis
            REDIS_PORT=6379
            REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
            KAFKA_BROKERS=kafka:9092
            AUTH_DATABASE_URL=${PGBASE}/auth_db?schema=public
            USER_DATABASE_URL=${PGBASE}/user_db?schema=public
            MARKET_DATABASE_URL=${PGBASE}/market_db?schema=public
            TRADING_DATABASE_URL=${PGBASE}/trading_db?schema=public
            WALLET_DATABASE_URL=${PGBASE}/wallet_db?schema=public
            PAYMENT_DATABASE_URL=${PGBASE}/payment_db?schema=public
            NOTIFICATION_DATABASE_URL=${PGBASE}/notification_db?schema=public
            ANALYTICS_DATABASE_URL=${PGBASE}/analytics_db?schema=public
            AUTH_SERVICE_URL=http://auth-service:3001
            USER_SERVICE_URL=http://user-service:3002
            MARKET_SERVICE_URL=http://market-service:3003
            TRADING_SERVICE_URL=http://trading-service:3004
            WALLET_SERVICE_URL=http://wallet-service:3005
            PAYMENT_SERVICE_URL=http://payment-service:3006
            NOTIFICATION_SERVICE_URL=http://notification-service:3007
            FEED_SERVICE_URL=http://feed-service:3008
            ADMIN_SERVICE_URL=http://admin-service:3009
            ANALYTICS_SERVICE_URL=http://analytics-service:3010
            GATEWAY_PORT=3000
            AUTH_SERVICE_PORT=3001
            USER_SERVICE_PORT=3002
            MARKET_SERVICE_PORT=3003
            TRADING_SERVICE_PORT=3004
            WALLET_SERVICE_PORT=3005
            PAYMENT_SERVICE_PORT=3006
            NOTIFICATION_SERVICE_PORT=3007
            FEED_SERVICE_PORT=3008
            ADMIN_SERVICE_PORT=3009
            ANALYTICS_SERVICE_PORT=3010
            APP_NAME=PredictMarket
            KAFKAJS_NO_PARTITIONER_WARNING=1
            JWT_PRIVATE_KEY="${JWT_PRIVATE_KEY}"
            JWT_PUBLIC_KEY="${JWT_PUBLIC_KEY}"
            JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN:-15m}
            JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-30d}
            INTERNAL_API_KEY="${INTERNAL_API_KEY}"
            MPESA_ENVIRONMENT=${MPESA_ENVIRONMENT:-sandbox}
            MPESA_CONSUMER_KEY="${MPESA_CONSUMER_KEY}"
            MPESA_CONSUMER_SECRET="${MPESA_CONSUMER_SECRET}"
            MPESA_SHORT_CODE=${MPESA_SHORT_CODE}
            MPESA_PASSKEY="${MPESA_PASSKEY}"
            MPESA_B2C_INITIATOR_NAME=${MPESA_B2C_INITIATOR_NAME}
            MPESA_B2C_SECURITY_CREDENTIAL="${MPESA_B2C_SECURITY_CREDENTIAL}"
            MPESA_CALLBACK_BASE_URL=${MPESA_CALLBACK_BASE_URL}
            MPESA_STK_CALLBACK_URL=${MPESA_STK_CALLBACK_URL}
            MPESA_B2C_RESULT_URL=${MPESA_B2C_RESULT_URL}
            MPESA_B2C_QUEUE_TIMEOUT_URL=${MPESA_B2C_QUEUE_TIMEOUT_URL}
            AT_API_KEY="${AT_API_KEY}"
            AT_USERNAME=${AT_USERNAME}
            AT_SENDER_ID=${AT_SENDER_ID}
            FIREBASE_SERVICE_ACCOUNT_JSON='${FIREBASE_SERVICE_ACCOUNT_JSON}'
            EOF
            mv .env.new .env

            # Log in to GHCR from the droplet so it can pull our private image.
            echo "${GHCR_PULL_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            # --ignore-pull-failures: the frontend image (ghcr.io/salvatoluis/kpm)
            # lives in a different GHCR namespace we don't have auth for from
            # this workflow. If it's public + published, it pulls fine. If not,
            # we soft-fail and up -d starts everything else. The frontend deploy
            # in the salvatoluis/kpm repo handles its own pull with the right token.
            docker compose -f docker-compose.prod.yml pull --ignore-pull-failures
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # nginx caches upstream DNS resolution failures during the brief
            # window when app containers are being recreated. Restart it so
            # it re-resolves fresh — otherwise every request 502s until the
            # cached entry expires. Cheap: nginx boots in <1s.
            docker compose -f docker-compose.prod.yml restart nginx

            docker image prune -f

      - name: Verify running containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/kenyapredict
            sleep 15
            docker compose -f docker-compose.prod.yml ps
