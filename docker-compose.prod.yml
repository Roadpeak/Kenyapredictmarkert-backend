# Production stack for kenyapredict backend.
# Runs 11 NestJS services from a SINGLE image (per-container SERVICE env var
# selects which app/<service>/dist/main.js is launched) + postgres + redis + kafka + nginx.
#
# Deployed to a single droplet via `docker compose -f docker-compose.prod.yml pull|up -d`.
# On-droplet .env supplies IMAGE_TAG and all app secrets.

x-app: &app-base
  image: ghcr.io/roadpeak/kenyapredictmarkert-backend:${IMAGE_TAG:-latest}
  restart: unless-stopped
  networks: [app_net]
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started
  env_file:
    - .env
  environment:
    NODE_ENV: production

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [app_net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [app_net]

  # Single-broker Kafka in KRaft mode (no separate zookeeper needed).
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    environment:
      # KRaft mode
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks: [app_net]

  # ─── 11 NestJS microservices — all share the same image ────────────────────
  api-gateway:
    <<: *app-base
    environment:
      SERVICE: api-gateway
      GATEWAY_PORT: "3000"

  auth-service:
    <<: *app-base
    environment:
      SERVICE: auth-service
      AUTH_SERVICE_PORT: "3001"
      # auth-service owns the shared postgres bootstrap: run migrations for
      # every service's schema on its startup (idempotent via prisma migrate deploy).
      APPLY_PRISMA_MIGRATIONS: "1"

  user-service:
    <<: *app-base
    environment:
      SERVICE: user-service
      USER_SERVICE_PORT: "3002"

  market-service:
    <<: *app-base
    environment:
      SERVICE: market-service
      MARKET_SERVICE_PORT: "3003"

  trading-service:
    <<: *app-base
    environment:
      SERVICE: trading-service
      TRADING_SERVICE_PORT: "3004"

  wallet-service:
    <<: *app-base
    environment:
      SERVICE: wallet-service
      WALLET_SERVICE_PORT: "3005"

  payment-service:
    <<: *app-base
    environment:
      SERVICE: payment-service
      PAYMENT_SERVICE_PORT: "3006"

  notification-service:
    <<: *app-base
    environment:
      SERVICE: notification-service
      NOTIFICATION_SERVICE_PORT: "3007"

  feed-service:
    <<: *app-base
    environment:
      SERVICE: feed-service
      FEED_SERVICE_PORT: "3008"

  admin-service:
    <<: *app-base
    environment:
      SERVICE: admin-service
      ADMIN_SERVICE_PORT: "3009"

  analytics-service:
    <<: *app-base
    environment:
      SERVICE: analytics-service
      ANALYTICS_SERVICE_PORT: "3010"

  # ─── Nginx reverse proxy — only ingress ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [app_net]

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  app_net:
    driver: bridge
