# Production stack for kenyapredict backend.
# Runs 11 NestJS services from a SINGLE image (per-container SERVICE env var
# selects which app/<service>/dist/main.js is launched) + postgres + redis + kafka + nginx.
#
# Deployed to a single droplet via `docker compose -f docker-compose.prod.yml pull|up -d`.
# On-droplet .env supplies IMAGE_TAG and all app secrets.

x-app: &app-base
  image: ghcr.io/roadpeak/kenyapredictmarkert-backend:${IMAGE_TAG:-latest}
  restart: unless-stopped
  networks: [app_net]
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started
  environment:
    NODE_ENV: production
    # Databases — every service reads only its own DATABASE_URL, but we pass
    # all of them via .env so compose doesn't need per-service duplication.
    AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
    USER_DATABASE_URL: ${USER_DATABASE_URL}
    MARKET_DATABASE_URL: ${MARKET_DATABASE_URL}
    TRADING_DATABASE_URL: ${TRADING_DATABASE_URL}
    WALLET_DATABASE_URL: ${WALLET_DATABASE_URL}
    PAYMENT_DATABASE_URL: ${PAYMENT_DATABASE_URL}
    NOTIFICATION_DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
    ANALYTICS_DATABASE_URL: ${ANALYTICS_DATABASE_URL}
    # Redis
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    # Kafka
    KAFKA_BROKERS: kafka:9092
    # JWT
    JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
    JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
    JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
    JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
    # Internal service-to-service auth
    INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    # Service-to-service URLs (docker DNS)
    AUTH_SERVICE_URL: http://auth-service:3001
    USER_SERVICE_URL: http://user-service:3002
    MARKET_SERVICE_URL: http://market-service:3003
    TRADING_SERVICE_URL: http://trading-service:3004
    WALLET_SERVICE_URL: http://wallet-service:3005
    PAYMENT_SERVICE_URL: http://payment-service:3006
    NOTIFICATION_SERVICE_URL: http://notification-service:3007
    FEED_SERVICE_URL: http://feed-service:3008
    ADMIN_SERVICE_URL: http://admin-service:3009
    ANALYTICS_SERVICE_URL: http://analytics-service:3010
    # M-Pesa (Safaricom Daraja)
    MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT:-sandbox}
    MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
    MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
    MPESA_SHORT_CODE: ${MPESA_SHORT_CODE}
    MPESA_PASSKEY: ${MPESA_PASSKEY}
    MPESA_B2C_INITIATOR_NAME: ${MPESA_B2C_INITIATOR_NAME}
    MPESA_B2C_SECURITY_CREDENTIAL: ${MPESA_B2C_SECURITY_CREDENTIAL}
    MPESA_CALLBACK_BASE_URL: ${MPESA_CALLBACK_BASE_URL}
    MPESA_STK_CALLBACK_URL: ${MPESA_STK_CALLBACK_URL}
    MPESA_B2C_RESULT_URL: ${MPESA_B2C_RESULT_URL}
    MPESA_B2C_QUEUE_TIMEOUT_URL: ${MPESA_B2C_QUEUE_TIMEOUT_URL}
    # Africa's Talking (OTP SMS)
    AT_API_KEY: ${AT_API_KEY}
    AT_USERNAME: ${AT_USERNAME}
    AT_SENDER_ID: ${AT_SENDER_ID}
    # Firebase Admin SDK
    FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
    APP_NAME: PredictMarket
  # Every service listens on its own port (see .env.example)
  # No host publishing — nginx is the only ingress.

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [app_net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [app_net]

  # Single-broker Kafka in KRaft mode (no separate zookeeper needed).
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    environment:
      # KRaft mode
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks: [app_net]

  # ─── 11 NestJS microservices — all share the same image ────────────────────
  api-gateway:
    <<: *app-base
    environment:
      SERVICE: api-gateway
      GATEWAY_PORT: "3000"

  auth-service:
    <<: *app-base
    environment:
      SERVICE: auth-service
      AUTH_SERVICE_PORT: "3001"
      # auth-service owns the shared postgres bootstrap: run migrations for
      # every service's schema on its startup (idempotent via prisma migrate deploy).
      APPLY_PRISMA_MIGRATIONS: "1"

  user-service:
    <<: *app-base
    environment:
      SERVICE: user-service
      USER_SERVICE_PORT: "3002"

  market-service:
    <<: *app-base
    environment:
      SERVICE: market-service
      MARKET_SERVICE_PORT: "3003"

  trading-service:
    <<: *app-base
    environment:
      SERVICE: trading-service
      TRADING_SERVICE_PORT: "3004"

  wallet-service:
    <<: *app-base
    environment:
      SERVICE: wallet-service
      WALLET_SERVICE_PORT: "3005"

  payment-service:
    <<: *app-base
    environment:
      SERVICE: payment-service
      PAYMENT_SERVICE_PORT: "3006"

  notification-service:
    <<: *app-base
    environment:
      SERVICE: notification-service
      NOTIFICATION_SERVICE_PORT: "3007"

  feed-service:
    <<: *app-base
    environment:
      SERVICE: feed-service
      FEED_SERVICE_PORT: "3008"

  admin-service:
    <<: *app-base
    environment:
      SERVICE: admin-service
      ADMIN_SERVICE_PORT: "3009"

  analytics-service:
    <<: *app-base
    environment:
      SERVICE: analytics-service
      ANALYTICS_SERVICE_PORT: "3010"

  # ─── Nginx reverse proxy — only ingress ────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [app_net]

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  app_net:
    driver: bridge
