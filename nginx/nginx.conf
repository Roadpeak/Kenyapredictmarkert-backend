# Rate-limit zones at http scope (this file is included from /etc/nginx/conf.d/).
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=20r/m;
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

server_tokens off;
client_max_body_size 10m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Reasonable timeouts + keepalives.
    send_timeout 10s;
    keepalive_timeout 15s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # Security headers on every response (including 4xx/5xx).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # HSTS deferred until TLS is in front.

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript application/xml text/css text/xml application/rss+xml;

    limit_conn conn_zone 30;

    # Health check
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Auth endpoints — tighter rate limit.
    location ~ ^/api/(auth|users/register|users/login) {
        limit_req zone=auth_zone burst=10 nodelay;
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # M-Pesa callbacks — Safaricom hits these; skip rate limit here (bursts are legit).
    location /api/callbacks/ {
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger docs
    location /docs {
        proxy_pass http://api-gateway:3000/docs;
        proxy_set_header Host $host;
    }

    # WebSocket path (socket.io hits /socket.io/*)
    location /socket.io/ {
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else → api-gateway
    location / {
        limit_req zone=api_zone burst=50 nodelay;
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
