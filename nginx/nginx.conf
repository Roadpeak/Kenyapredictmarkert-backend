# Rate-limit zones at http scope (this file is included from /etc/nginx/conf.d/).
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=20r/m;
limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

server_tokens off;
client_max_body_size 10m;

# ─── Common building blocks reused by both server blocks ──────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── 1. API host — api.kenyapolymarket.com → backend only ─────────────────────
# NestJS backend uses `setGlobalPrefix('api')`, so REST routes live at /api/*.
# The salvatoluis/kpm frontend calls the api. host WITHOUT the /api prefix
# (e.g. POST /auth/login, GET /markets). To bridge the two shapes without
# code changes, this host prepends /api to any request whose path isn't
# already /api/, /docs, /docs-json, /socket.io/, or /healthz.
server {
    listen 80;
    listen [::]:80;
    server_name api.kenyapolymarket.com;

    send_timeout 10s;
    keepalive_timeout 15s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript application/xml text/css text/xml application/rss+xml;

    limit_conn conn_zone 30;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # /docs and /docs-json are Nest routes set up OUTSIDE setGlobalPrefix —
    # forward without rewrite.
    location = /docs { proxy_pass http://api-gateway:3000/docs; proxy_set_header Host $host; }
    location = /docs-json { proxy_pass http://api-gateway:3000/docs-json; proxy_set_header Host $host; }
    location /docs/ { proxy_pass http://api-gateway:3000/docs/; proxy_set_header Host $host; }

    # WebSocket gateway (Socket.IO) also bypasses setGlobalPrefix.
    location /socket.io/ {
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Explicit /api/... — forward as-is (M-Pesa callbacks + curl/Swagger users).
    location ~ ^/api/(auth|users/register|users/login) {
        limit_req zone=auth_zone burst=10 nodelay;
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/callbacks/ {
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_zone burst=50 nodelay;
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bare /auth/... — tighter rate limit for auth routes, prepend /api.
    location ~ ^/(auth|users/register|users/login)(/|$) {
        limit_req zone=auth_zone burst=10 nodelay;
        rewrite ^(.*)$ /api$1 break;
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all — anything without /api/, /docs, /socket.io/, /healthz gets
    # the prefix prepended. Handles the frontend's /markets, /trading, /wallet
    # etc. calls without needing per-path location blocks.
    location / {
        limit_req zone=api_zone burst=50 nodelay;
        rewrite ^(.*)$ /api$1 break;
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── 2. Web host — kenyapolymarket.com + www → frontend, /api/* → backend ─────
# Kept the /api/*, /docs, /socket.io/* pass-through on the web host so:
#   - The browser can call same-origin /api paths without CORS
#   - M-Pesa callbacks configured against MPESA_CALLBACK_BASE_URL=https://kenyapolymarket.com
#     continue to reach the backend even if operator flips them later.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name kenyapolymarket.com www.kenyapolymarket.com _;

    send_timeout 10s;
    keepalive_timeout 15s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    # COOP/CORP dropped here — Next.js needs to embed cross-origin resources.

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript application/xml text/css text/xml application/rss+xml;

    limit_conn conn_zone 30;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # API pass-through — matches every browser-side call the frontend makes.
    location ~ ^/api/(auth|users/register|users/login) {
        limit_req zone=auth_zone burst=10 nodelay;
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/callbacks/ {
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_zone burst=50 nodelay;
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://api-gateway:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else → frontend (Next.js). Includes /_next/* static assets,
    # /public assets, HTML routes, and the root landing page.
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Support Next.js HMR-style upgrades even in prod (RSC streams).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
